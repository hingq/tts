name: Build Docker image (tar)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag / tar suffix'
        required: false
        default: latest

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: audiobook-generation-service:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image to tar
        run: |
          docker save -o audiobook-generation-service-${{ inputs.tag }}.tar \
            audiobook-generation-service:${{ inputs.tag }}

      - name: Upload tar to remote server via SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST || '82.156.247.203' }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR || '/tts' }}
        run: |
          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          printf '%s\n' "$SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          scp -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=10 \
              -o ServerAliveCountMax=3 \
              -o ConnectTimeout=30 \
              -o BatchMode=yes \
              -i "$KEY_FILE" -P "$SSH_PORT" \
              ./audiobook-generation-service-${{ inputs.tag }}.tar \
              root@"$SSH_HOST":"$SSH_TARGET_DIR"/
